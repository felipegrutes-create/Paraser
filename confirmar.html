<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Paraser</title>
  <style>
    body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#f3f0f8}
    .card{max-width:420px;margin:9vh auto;background:#fff;border-radius:18px;padding:38px 26px;text-align:center;box-shadow:0 10px 34px rgba(91,58,140,.14)}
    .emoji{font-size:56px;line-height:1}
    h1{color:#5b3a8c;font-size:22px;margin:16px 0 10px}
    p.msg{color:#555;font-size:16px;line-height:1.5;margin:0;min-height:24px}
    .rodape{color:#b3a6c9;font-size:13px;margin-top:28px}
    .dot{display:inline-block;width:9px;height:9px;margin:0 3px;border-radius:50%;background:#9b7ec9;animation:b 1.2s infinite ease-in-out}
    .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
    @keyframes b{0%,80%,100%{opacity:.3}40%{opacity:1}}
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji" id="emoji">💜</div>
    <h1 id="titulo">Um instante…</h1>
    <p class="msg" id="msg"><span class="dot"></span><span class="dot"></span><span class="dot"></span></p>
    <p class="rodape">Clínica Paraser 💜</p>
  </div>
  <script>
    // Chama o sistema nos bastidores e mostra o resultado AQUI (sem sair do app.paraser.com.br).
    var APPS = 'https://script.google.com/macros/s/AKfycbwArc3KbaFEABGJaTghmznnxBkeGEZs-vu-122vdngfMpvaIg3VL9742YpydZ-1ELxuMA/exec';
    var p = new URLSearchParams(location.search);
    var a = p.get('a') || '', ag = p.get('ag') || '', t = p.get('t') || '';
    var qs = '?a=' + encodeURIComponent(a) + '&ag=' + encodeURIComponent(ag) + '&t=' + encodeURIComponent(t);
    function show(e, ti, m) {
      document.getElementById('emoji').textContent = e;
      document.getElementById('titulo').textContent = ti;
      document.getElementById('msg').textContent = m;
    }
    if (!a || !ag || !t) {
      show('⚠️', 'Link inválido', 'Fale com a recepção pelo WhatsApp. 💜');
    } else {
      fetch(APPS + qs + '&fmt=json')
        .then(function (r) { return r.json(); })
        .then(function (d) { show(d.emoji || '✅', d.titulo || 'Pronto!', d.msg || ''); })
        .catch(function () { location.replace(APPS + qs); }); // fallback raro: encaminha pro sistema
    }
  </script>
</body>
</html>
