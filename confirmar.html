<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Paraser</title>
  <style>
    body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#f3f0f8;color:#5b3a8c;text-align:center}
    .box{max-width:420px;margin:13vh auto;padding:30px}
    .dot{display:inline-block;width:10px;height:10px;margin:0 3px;border-radius:50%;background:#9b7ec9;animation:b 1.2s infinite ease-in-out}
    .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
    @keyframes b{0%,80%,100%{opacity:.3}40%{opacity:1}}
  </style>
</head>
<body>
  <div class="box">
    <div style="font-size:50px">💜</div>
    <p style="font-size:18px;margin:16px 0 22px">Um instante, estamos processando…</p>
    <div><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
  </div>
  <script>
    // Encaminha pro sistema (Apps Script) mantendo os parâmetros do link.
    var APPS = 'https://script.google.com/macros/s/AKfycbwArc3KbaFEABGJaTghmznnxBkeGEZs-vu-122vdngfMpvaIg3VL9742YpydZ-1ELxuMA/exec';
    var p = new URLSearchParams(location.search);
    var url = APPS + '?a=' + encodeURIComponent(p.get('a') || '') +
              '&ag=' + encodeURIComponent(p.get('ag') || '') +
              '&t='  + encodeURIComponent(p.get('t')  || '');
    location.replace(url);
  </script>
</body>
</html>
